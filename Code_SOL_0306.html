<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dino Game</title>

  <style>
    #score {
  text-align: center;
}

#cage {
  width: 600px;
  height: 325px;
  border: 2px solid black;
  margin: auto;
  background-image: url("https://img.ricardostatic.ch/images/7ae0a875-6370-496e-b27f-f036b5ba5fbc/t_1000x750/meerschweinchen-stall");
  background-size: cover;
}

#guineapig {
  height: 100px;
  width: 175px;
  top: 225px;
  position: relative;
  background-image: url("https://cdn.shopify.com/s/files/1/0021/7645/0642/files/guinea_pig-1_480x480.png?v=1747426266");
  background-size: cover;
}

#rock {
  width: 50px;
  height: 50px;
  position: relative;
  top: 175px;
  left: 550px;
  background-image: url("https://github.com/kriscfoster/chrome-dino-game/blob/master/rock.png?raw=true");
  background-size: cover;
  animation: rock 1.33s infinite linear;
}

@keyframes rock {
  0% { left: 550px; }
  100% { left: -50px; }
}

.jump-animation {
  animation: jump 0.6s ease-out forwards;
}

@keyframes jump {
  0% { top: 225px; }
  50% { top: 150px; }
  75% { top: 75px; }
  100% { top: 225px; }
}
  </style>

  
</head>
<body>
  <button id="startButton">Start</button>

<div id="cage">
  <div id="guineapig"></div>
  <div id="rock"></div>
</div>

<h1 id="score">0</h1>

  <script>
    const guineapig = document.getElementById("guineapig")
const rock = document.getElementById("rock")
const score = document.getElementById("score")
const startButton = document.getElementById("startButton")

let gameLoop
score.innerText = 0

function jump() {
  if (!guineapig.classList.contains("jump-animation")) {
    guineapig.classList.add("jump-animation")
    setTimeout(() => guineapig.classList.remove("jump-animation"), 600)
  }
}

document.addEventListener("keydown", function(event) {
  if (event.code === "Space") {
    jump()
  }
})

function startGame() {
  score.innerText = 0
  rock.style.animation = "rock 1.33s infinite linear"
  rock.style.display = ""
  rock.style.left = "550px"

  gameLoop = setInterval(function() {
    const guineapigTop = parseInt(window.getComputedStyle(guineapig).getPropertyValue("top"))
    const rockLeft = parseInt(window.getComputedStyle(rock).getPropertyValue("left"))

    score.innerText++

    if (rockLeft < 0) {
      rock.style.display = "none"
    } else {
      rock.style.display = ""
    }

    if (rockLeft < 50 && rockLeft > 0 && guineapigTop > 150) {
      clearInterval(gameLoop)
      rock.style.animation = "none"
      score.innerText = 0
      alert("Game Over")
    }

  }, 10)
}

startButton.addEventListener("click", startGame)
  </script>
</body>
</html>
